# NVSentinel — Azure Cosmos DB for MongoDB values override
# See docs/external-datastore.md for setup instructions.
#
# Usage (URI only in a Kubernetes Secret — set MONGODB_URI from Azure Connection Strings first):
#   kubectl create secret generic nvsentinel-datastore-mongodb-uri \
#     --from-literal=MONGODB_URI="$MONGODB_URI" \
#     --namespace nvsentinel
#   helm upgrade --install nvsentinel . \
#     -f values.yaml \
#     -f values-cosmosdb-test.yaml \
#     --namespace nvsentinel

global:
  mongodbStore:
    enabled: false

  datastore:
    provider: "mongodb"

    # Full URI must be in Secret key MONGODB_URI (see Usage above).
    # Cosmos DB uses a public DigiCert CA — no custom CA cert required.
    credentialsFromSecret:
      name: nvsentinel-datastore-mongodb-uri

    connection:
      database: "HealthEventsDatabase"

    tls:
      enabled: true
      caSecretName: ""  # Cosmos DB uses public DigiCert CA — system CAs are sufficient.

    auth:
      mechanism: "scram"

# Cosmos DB uses SCRAM-SHA-256 with no custom CA cert — no client certificate files
# are needed. clientCertMountPath: "" prevents the cert-polling loop at startup.
health-events-analyzer:
  clientCertMountPath: ""

fault-remediation:
  clientCertMountPath: ""

fault-quarantine:
  clientCertMountPath: ""

node-drainer:
  clientCertMountPath: ""

event-exporter:
  mongodbStore:
    clientCertMountPath: ""

csp-health-monitor:
  clientCertMountPath: ""


platformConnector:
  mongodbStore:
    clientCertMountPath: ""
