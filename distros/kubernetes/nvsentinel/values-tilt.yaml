global:
  dryRun: false
  kubeVersion: 1.31.0

  nodeSelector: {}
  
  tolerations: 
  - operator: Exists
  
  affinity: {}
  
  systemNodeSelector:
    node-role.kubernetes.io/control-plane: ""
  
  systemNodeTolerations:
  - operator: Exists

  gpuHealthMonitor:
    enabled: true

  healthEventsAnalyzer:
    enabled: true

  faultQuarantine:
    enabled: true

  nodeDrainer:
    enabled: true

  faultRemediation:
    enabled: true

  dcaHealthMonitor:
    enabled: false

  cspHealthMonitor:
    enabled: false

  syslogHealthMonitor:
    enabled: true
    xidSideCar:
      enabled: false

  inclusterFileServer:
    enabled: false
  
  janitor:
    enabled: true

  mongodbStore:
    enabled: true

  metadataCollector:
    enabled: false

  kubernetesObjectMonitor:
    enabled: true

mongodb-store:
  useBitnami: true
  usePerconaOperator: false
  
  job:
    nodeSelector:
      node-role.kubernetes.io/control-plane: ""
    tolerations:
      - operator: Exists
  
  psmdb-operator:
    nodeSelector:
      node-role.kubernetes.io/control-plane: ""
    tolerations:
      - operator: Exists

  psmdb-db:
    nameOverride: mongodb
    fullnameOverride: mongodb
    replsets:
      rs0:
        name: rs0
        size: 3
        configuration: |
          setParameter:
            authenticationMechanisms: "MONGODB-X509,SCRAM-SHA-256,SCRAM-SHA-1"
        replsetOverrides:
          mongodb-rs0-0:
            priority: 3
          mongodb-rs0-1:
            priority: 1
          mongodb-rs0-2:
            priority: 1
        volumeSpec:
          pvc:
            resources:
              requests:
                storage: "1Gi"
        nodeSelector:
          node-role.kubernetes.io/control-plane: ""
        tolerations:
          - operator: Exists
        podDisruptionBudget:
          maxUnavailable: 1
    
    sharding:
      enabled: false
      
    logcollector:
      enabled: false
    
    tls:
      mode: requireTLS

    secrets:
      keyFile: mongodb-keyfile
      encryptionKey: mongodb-encryption-key
    
    backup:
      enabled: false
      storages: {}
      tasks: []
      volumeMounts: []
    
    finalizers: []

  psmdb:
    helperImages:
      kubectl:
        repository: docker.io/lachlanevenson/k8s-kubectl
        tag: "v1.25.4"
        pullPolicy: IfNotPresent
      mongosh:
        repository: ghcr.io/rtsp/docker-mongosh
        tag: "2.5.2"
        pullPolicy: IfNotPresent
  
  # Bitnami configuration
  mongodb:
    replicaCount: 1
    nodeSelector:
      node-role.kubernetes.io/control-plane: ""
    
    tolerations:
    - operator: Exists

    jobTolerations:
    - operator: Exists

    image:
      registry: "docker.io"
      repository: "bitnamilegacy/mongodb"
      tag: "8.0.3-debian-12-r1"
      pullPolicy: "IfNotPresent"

    tls:
      replicaset:
        existingSecrets:
          - "mongo-server-cert-0"
      
      image:
        registry: "docker.io"
        repository: "bitnamilegacy/nginx"
        tag: "1.27.2-debian-12-r2"
        pullPolicy: "IfNotPresent"

    metrics:
      enabled: true
      image:
        registry: docker.io
        repository: bitnamilegacy/mongodb-exporter
        tag: 0.41.2-debian-12-r1

# Override log levels for all modules during testing
fault-quarantine:
  logLevel: debug

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: kwok
        namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system
        topologyKey: kubernetes.io/hostname

fault-remediation:
  logLevel: debug

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: kwok
        namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system
        topologyKey: kubernetes.io/hostname


node-drainer:
  logLevel: debug

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: kwok
        namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system
        topologyKey: kubernetes.io/hostname


health-events-analyzer:
  logLevel: debug

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: kwok
        namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system
        topologyKey: kubernetes.io/hostname

janitor:
  webhook:
    certIssuer: "janitor-selfsigned-issuer"

labeler:
  logLevel: debug
  # Test kata label override with the annotation present on kata test nodes
  # Uncomment to test custom kata detection:
  # kataLabelOverride: "io.katacontainers.config.runtime.oci_runtime"

csp-health-monitor:
  logLevel: debug
  quarantineTriggerEngine:
    logLevel: debug

# Enable node metadata enrichment for testing
platformConnector:
  nodeMetadata:
    enabled: true

kubernetes-object-monitor:
  logLevel: debug

  policies:
    - name: node-test-condition
      enabled: true
      resource:
        group: ""
        version: v1
        kind: Node
      predicate:
        expression: |
          resource.status.conditions.filter(c, c.type == "TestCondition" && c.status == "False").size() > 0
      healthEvent:
        componentClass: Node
        isFatal: false
        message: "Node test condition is not ready"
        recommendedAction: CONTACT_SUPPORT
        errorCode:
          - NODE_TEST_CONDITION_NOT_READY

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: kwok
        namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system
        topologyKey: kubernetes.io/hostname
