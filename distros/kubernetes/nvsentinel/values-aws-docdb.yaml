# NVSentinel — AWS DocumentDB values override
# See docs/external-datastore.md for setup instructions.
#
# Usage (URI only in a Kubernetes Secret — set MONGODB_URI from the AWS console connection string first):
#   kubectl create secret generic nvsentinel-datastore-mongodb-uri \
#     --from-literal=MONGODB_URI="$MONGODB_URI" \
#     --namespace nvsentinel
#   helm upgrade --install nvsentinel . \
#     -f values.yaml \
#     -f values-aws-docdb.yaml \
#     --namespace nvsentinel

global:
  mongodbStore:
    enabled: false

  datastore:
    provider: "mongodb"

    # Full URI must be in Secret key MONGODB_URI (see Usage above).
    credentialsFromSecret:
      name: nvsentinel-datastore-mongodb-uri

    connection:
      database: "HealthEventsDatabase"

    tls:
      enabled: true
      # CA cert secret created from the AWS global CA bundle (see docs/external-datastore.md).
      caSecretName: "docdb-ca"

    auth:
      mechanism: "scram"

# DocumentDB uses SCRAM auth with a custom CA cert. clientCertMountPath: "" signals
# SCRAM mode (no client cert bundle) while still allowing the CA cert to be mounted
# via the caSecretName above.
health-events-analyzer:
  clientCertMountPath: ""

fault-remediation:
  clientCertMountPath: ""

fault-quarantine:
  clientCertMountPath: ""

node-drainer:
  clientCertMountPath: ""

event-exporter:
  mongodbStore:
    clientCertMountPath: ""

csp-health-monitor:
  clientCertMountPath: ""

platformConnector:
  mongodbStore:
    clientCertMountPath: ""
