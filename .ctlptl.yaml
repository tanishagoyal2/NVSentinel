apiVersion: ctlptl.dev/v1alpha1
kind: Registry
name: ctlptl-registry
port: 5001
---
apiVersion: ctlptl.dev/v1alpha1
kind: Cluster
product: kind
name: kind-nvsentinel
registry: ctlptl-registry
kindV1Alpha4Cluster:
  nodes:
    - role: control-plane
    - role: control-plane
    - role: control-plane
    - role: worker
      kubeadmConfigPatches:
        - |
          kind: JoinConfiguration
          nodeRegistration:
            kubeletExtraArgs:
              node-labels: "nvidia.com/gpu.deploy.dcgm=true,nvidia.com/gpu.deploy.driver=true"
    - role: worker
      kubeadmConfigPatches:
        - |
          kind: JoinConfiguration
          nodeRegistration:
            kubeletExtraArgs:
              node-labels: "nvidia.com/gpu.deploy.dcgm=true,nvidia.com/gpu.deploy.driver=true"